<meta charset="utf-8" />
<title>Mapa Paso Coyote — Editor GeoJSON</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Leaflet -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<!-- Leaflet-Geoman -->
<link
  rel="stylesheet"
  href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.css"
/>

<style>
  html,
  body {
    margin: 0;
    height: 100%;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  #map {
    position: absolute;
    inset: 0;
    top: 52px;
  }
  #toolbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 52px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    background: #1f2933;
    color: #fff;
    z-index: 1000;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    flex-wrap: nowrap;
    overflow-x: auto;
  }
  #toolbar strong {
    font-size: 15px;
    margin-right: 6px;
    white-space: nowrap;
  }
  #toolbar button,
  #toolbar label.btn {
    background: #3e4c59;
    color: #fff;
    border: 0;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  #toolbar button:hover,
  #toolbar label.btn:hover {
    background: #52606d;
  }
  #toolbar button.on {
    background: #2f855a;
  }
  #toolbar .spacer {
    flex: 1;
  }
  #toolbar .count {
    font-size: 12px;
    opacity: 0.85;
    white-space: nowrap;
  }
  #fileInput {
    display: none;
  }

  /* Formulario del popup */
  .feat-form label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin: 6px 0 2px;
    color: #333;
  }
  .feat-form input[type="text"],
  .feat-form textarea,
  .feat-form select {
    width: 100%;
    box-sizing: border-box;
    font-size: 13px;
    padding: 5px 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
  }
  .feat-form textarea {
    resize: vertical;
    min-height: 48px;
  }
  .feat-form .meta {
    font-size: 11px;
    color: #666;
    margin-top: 6px;
    line-height: 1.4;
  }
  .feat-form .row-btns {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .feat-form button {
    flex: 1;
    border: 0;
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .feat-form .save {
    background: #2f855a;
    color: #fff;
  }
  .feat-form .del {
    background: #c53030;
    color: #fff;
    flex: 0 0 auto;
  }
  .leaflet-popup-content {
    width: 240px !important;
    margin: 10px 12px;
  }

  /* Etiquetas de elementos */
  .feat-label {
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid #999;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #222;
    padding: 1px 5px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
  }

  /* Leyenda */
  .legend {
    background: #fff;
    padding: 8px 10px;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    font-size: 12px;
    line-height: 1.7;
  }
  .legend h4 {
    margin: 0 0 4px;
    font-size: 12px;
  }
  .legend .dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: -1px;
    border: 1px solid rgba(0, 0, 0, 0.3);
  }
</style>

<div id="toolbar">
  <strong>Paso Coyote — Mapa</strong>
  <label class="btn" for="fileInput">Cargar GeoJSON</label>
  <input type="file" id="fileInput" accept=".geojson,.json,application/geo+json" />
  <button id="reloadBtn" title="Recargar el paso-coyote.geojson del repo">Recargar base</button>
  <button id="labelsBtn" class="on">Etiquetas: ON</button>
  <button id="exportBtn">Exportar GeoJSON</button>
  <span class="spacer"></span>
  <span class="count" id="count">0 features</span>
</div>
<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet-Geoman -->
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.17.0/dist/leaflet-geoman.min.js"></script>

<script>
  // ---------------------------------------------------------------------------
  // Tipos: color de ícono/línea por tipo.
  // ---------------------------------------------------------------------------
  const TYPES = {
    OLT:     { label: "OLT",     color: "#c53030" }, // rojo
    NAP:     { label: "NAP",     color: "#2b6cb0" }, // azul
    empalme: { label: "Empalme", color: "#dd6b20" }, // naranja
    troncal: { label: "Troncal", color: "#6b46c1" }, // morado (líneas)
    poste:        { label: "Poste",        color: "#38a169" }, // verde
    reserva:      { label: "Reserva",      color: "#d69e2e" }, // amarillo/mostaza
    cliente:      { label: "Cliente",      color: "#319795" }, // teal
    splitter:     { label: "Splitter",     color: "#111827" }, // negro (nodo de split)
    distribucion: { label: "Distribución", color: "#d53f8c" }, // magenta (cable a NAPs)
    otro:         { label: "Otro",         color: "#718096" }, // gris
  };
  const DEFAULT_POINT_TYPE = "otro";
  const DEFAULT_LINE_TYPE = "troncal";
  const BASE_FILE = "paso-coyote.geojson";

  function makeIcon(color) {
    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="38" viewBox="0 0 26 38">
        <path d="M13 0C6 0 0 5.6 0 12.6 0 22 13 38 13 38s13-16 13-25.4C26 5.6 20 0 13 0z"
              fill="${color}" stroke="#fff" stroke-width="1.5"/>
        <circle cx="13" cy="12.5" r="5" fill="#fff"/>
      </svg>`;
    return L.divIcon({
      className: "custom-pin",
      html: svg,
      iconSize: [26, 38],
      iconAnchor: [13, 38],
      popupAnchor: [0, -34],
      tooltipAnchor: [0, -30],
    });
  }
  const iconCache = {};
  function iconForType(tipo) {
    const t = TYPES[tipo] ? tipo : DEFAULT_POINT_TYPE;
    if (!iconCache[t]) iconCache[t] = makeIcon(TYPES[t].color);
    return iconCache[t];
  }
  function colorForType(tipo, fallback) {
    return TYPES[tipo] ? TYPES[tipo].color : TYPES[fallback].color;
  }

  // ---------------------------------------------------------------------------
  // Mapa base
  // ---------------------------------------------------------------------------
  const map = L.map("map").setView([18.6233, -96.3287], 15);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors",
  }).addTo(map);

  const featuresLayer = L.featureGroup().addTo(map);
  let labelsOn = true;

  // ---------------------------------------------------------------------------
  // Geoman (marcador + línea)
  // ---------------------------------------------------------------------------
  map.pm.addControls({
    position: "topleft",
    drawMarker: true,
    drawPolyline: true,
    editMode: true,
    dragMode: true,
    removalMode: true,
    drawCircle: false,
    drawCircleMarker: false,
    drawPolygon: false,
    drawRectangle: false,
    drawText: false,
    cutPolygon: false,
    rotateMode: false,
  });
  map.pm.setGlobalOptions({ layerGroup: featuresLayer });

  // ---------------------------------------------------------------------------
  // Helpers
  // ---------------------------------------------------------------------------
  function isLine(layer) {
    return layer instanceof L.Polyline && !(layer instanceof L.Polygon);
  }
  function isMarker(layer) {
    return layer instanceof L.Marker;
  }

  function ensureFeature(layer, defaults) {
    if (!layer.feature) layer.feature = { type: "Feature", properties: {} };
    if (!layer.feature.properties) layer.feature.properties = {};
    const p = layer.feature.properties;
    if (p.name == null) p.name = defaults.name || "";
    if (p.description == null) p.description = defaults.description || "";
    if (p.tipo == null) p.tipo = defaults.tipo;
    return p;
  }

  // Largo total de una polyline en metros.
  function lineLength(layer) {
    const latlngs = layer.getLatLngs();
    let total = 0;
    for (let i = 1; i < latlngs.length; i++) {
      total += latlngs[i - 1].distanceTo(latlngs[i]);
    }
    return total;
  }
  function fmtLength(m) {
    return m >= 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m";
  }

  function applyStyle(layer) {
    const p = layer.feature.properties;
    if (isMarker(layer)) {
      layer.setIcon(iconForType(p.tipo));
    } else if (isLine(layer)) {
      layer.setStyle({ color: colorForType(p.tipo, DEFAULT_LINE_TYPE), weight: 4 });
    }
  }

  // Texto de la etiqueta flotante.
  function labelText(layer) {
    const p = layer.feature.properties;
    const typeLabel = TYPES[p.tipo] ? TYPES[p.tipo].label : "";
    let t = p.name || typeLabel || "(sin nombre)";
    if (isLine(layer)) t += " · " + fmtLength(lineLength(layer));
    return t;
  }

  function refreshLabel(layer) {
    layer.unbindTooltip();
    layer.bindTooltip(labelText(layer), {
      permanent: labelsOn,
      direction: isMarker(layer) ? "top" : "center",
      className: "feat-label",
      opacity: 0.95,
    });
  }

  // ---------------------------------------------------------------------------
  // Formulario en popup
  // ---------------------------------------------------------------------------
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function buildForm(layer) {
    const p = layer.feature.properties;
    const wrap = document.createElement("div");
    wrap.className = "feat-form";

    const options = Object.keys(TYPES)
      .map(
        (k) =>
          `<option value="${k}" ${k === p.tipo ? "selected" : ""}>${escapeHtml(
            TYPES[k].label
          )}</option>`
      )
      .join("");

    let meta = "";
    if (isMarker(layer)) {
      const ll = layer.getLatLng();
      meta = `Lat ${ll.lat.toFixed(6)}, Lng ${ll.lng.toFixed(6)}`;
    } else if (isLine(layer)) {
      meta = `Longitud: ${fmtLength(lineLength(layer))} · ${
        layer.getLatLngs().length
      } vértices`;
    }

    wrap.innerHTML = `
      <label>Tipo</label>
      <select class="f-tipo">${options}</select>
      <label>Nombre (name)</label>
      <input type="text" class="f-name" value="${escapeHtml(p.name)}" />
      <label>Descripción (description)</label>
      <textarea class="f-desc">${escapeHtml(p.description)}</textarea>
      <div class="meta">${escapeHtml(meta)}</div>
      <div class="row-btns">
        <button class="save" type="button">Guardar</button>
        <button class="del" type="button" title="Borrar">🗑</button>
      </div>
    `;

    wrap.querySelector(".save").addEventListener("click", () => {
      p.name = wrap.querySelector(".f-name").value;
      p.description = wrap.querySelector(".f-desc").value;
      p.tipo = wrap.querySelector(".f-tipo").value;
      applyStyle(layer);
      refreshLabel(layer);
      layer.closePopup();
    });

    wrap.querySelector(".del").addEventListener("click", () => {
      featuresLayer.removeLayer(layer);
      updateCount();
    });

    return wrap;
  }

  function registerLayer(layer, defaults) {
    ensureFeature(layer, defaults);
    applyStyle(layer);
    refreshLabel(layer);
    layer.bindPopup(() => buildForm(layer));
    layer.on("click", () => layer.openPopup());
    // Recalcular etiqueta/longitud tras editar la geometría.
    layer.on("pm:edit pm:dragend", () => refreshLabel(layer));
    updateCount();
  }

  // ---------------------------------------------------------------------------
  // Alta manual
  // ---------------------------------------------------------------------------
  map.on("pm:create", (e) => {
    const layer = e.layer;
    const defaults = isMarker(layer)
      ? { tipo: DEFAULT_POINT_TYPE }
      : { tipo: DEFAULT_LINE_TYPE };
    registerLayer(layer, defaults);
    layer.openPopup();
  });
  map.on("pm:remove", updateCount);

  // ---------------------------------------------------------------------------
  // Cargar GeoJSON
  // ---------------------------------------------------------------------------
  function loadGeoJSON(data, fit) {
    L.geoJSON(data, {
      pointToLayer: (feature, latlng) => L.marker(latlng),
      onEachFeature: (feature, layer) => {
        const gtype = feature.geometry && feature.geometry.type;
        if (gtype !== "Point" && gtype !== "LineString") return;
        layer.feature = layer.feature || feature;
        layer.feature.properties = feature.properties || {};
        const defaults = isMarker(layer)
          ? { tipo: DEFAULT_POINT_TYPE }
          : { tipo: DEFAULT_LINE_TYPE };
        layer.addTo(featuresLayer);
        registerLayer(layer, defaults);
      },
    });
    if (fit) fitToFeatures();
  }

  function fitToFeatures() {
    const b = featuresLayer.getBounds();
    if (b.isValid()) map.fitBounds(b, { padding: [50, 50] });
  }

  function clearFeatures() {
    featuresLayer.clearLayers();
    updateCount();
  }

  // Autocarga del archivo base del repo.
  function loadBase(fit) {
    fetch(BASE_FILE + "?t=" + Date.now())
      .then((r) => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then((data) => loadGeoJSON(data, fit))
      .catch((err) =>
        console.warn("No se pudo autocargar " + BASE_FILE + ":", err.message)
      );
  }

  document.getElementById("fileInput").addEventListener("change", (ev) => {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        loadGeoJSON(JSON.parse(reader.result), true);
      } catch (err) {
        alert("No se pudo leer el GeoJSON: " + err.message);
      }
      ev.target.value = "";
    };
    reader.readAsText(file);
  });

  document.getElementById("reloadBtn").addEventListener("click", () => {
    if (
      !confirm(
        "Esto borra lo que hay en el mapa y recarga " +
          BASE_FILE +
          " del repo. ¿Continuar?"
      )
    )
      return;
    clearFeatures();
    loadBase(true);
  });

  // ---------------------------------------------------------------------------
  // Etiquetas ON/OFF
  // ---------------------------------------------------------------------------
  document.getElementById("labelsBtn").addEventListener("click", (e) => {
    labelsOn = !labelsOn;
    e.target.textContent = "Etiquetas: " + (labelsOn ? "ON" : "OFF");
    e.target.classList.toggle("on", labelsOn);
    featuresLayer.eachLayer((layer) => {
      if (isMarker(layer) || isLine(layer)) refreshLabel(layer);
    });
  });

  // ---------------------------------------------------------------------------
  // Exportar (descarga como paso-coyote.geojson)
  // ---------------------------------------------------------------------------
  document.getElementById("exportBtn").addEventListener("click", () => {
    const features = [];
    featuresLayer.eachLayer((layer) => {
      if (!(isMarker(layer) || isLine(layer))) return;
      const gj = layer.toGeoJSON();
      const p = layer.feature.properties || {};
      gj.properties = {
        name: p.name || "",
        description: p.description || "",
        tipo: p.tipo || (isMarker(layer) ? DEFAULT_POINT_TYPE : DEFAULT_LINE_TYPE),
      };
      features.push(gj);
    });

    const fc = { type: "FeatureCollection", features };
    const blob = new Blob([JSON.stringify(fc, null, 2)], {
      type: "application/geo+json",
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = BASE_FILE;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  // ---------------------------------------------------------------------------
  // Leyenda
  // ---------------------------------------------------------------------------
  const legend = L.control({ position: "bottomright" });
  legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");
    let html = "<h4>Tipos</h4>";
    Object.keys(TYPES).forEach((k) => {
      html += `<div><span class="dot" style="background:${TYPES[k].color}"></span>${TYPES[k].label}</div>`;
    });
    div.innerHTML = html;
    return div;
  };
  legend.addTo(map);

  // ---------------------------------------------------------------------------
  // Contador
  // ---------------------------------------------------------------------------
  function updateCount() {
    let n = 0;
    featuresLayer.eachLayer((layer) => {
      if (isMarker(layer) || isLine(layer)) n++;
    });
    document.getElementById("count").textContent = n + " features";
  }

  // Arranque
  updateCount();
  loadBase(true);
</script>
